# Tham khảo + mặc định khi gọi FolSFTConfig.from_env(): đọc file này trước, rồi biến FOL_* / .env ghi đè.
# Không đặt bí mật trong YAML — dùng .env cho token / path riêng máy.

model:
  name: Qwen/Qwen2.5-3B-Instruct
  trust_remote_code: true
  max_seq_length: 2048
  gen_max_new_tokens: 512

lora:
  r: 8
  alpha: 16
  dropout: 0.05

training:
  num_train_epochs: 10
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  warmup_ratio: 0.05
  weight_decay: 0.01
  logging_steps: 10
  bf16: true
  gradient_checkpointing: true
  train_seed: 3407
  gpu_profile: auto
  # true hoặc FOL_LOAD_IN_8BIT=1 / FOL_GPU_PROFILE=8bit — INT8 bitsandbytes (chính xác hơn NF4; FOL_LOAD_IN_4BIT=1 vẫn bật INT8)
  load_in_8bit: true
  # T4 / OOM: Unsloth + loss chỉ assistant + adamw_8bit (cần pip install unsloth); notebook: FolSFTConfig.from_env(use_unsloth=True)
  use_unsloth: true
  unsloth_train_on_responses_only: true
  use_adamw_8bit: true

paths:
  # FOL_SFT_PROCESSED_DIR hoặc mặc định data/processed (chung với logic SFT)
  processed_subdir: data/processed

hub:
  org: Laplaces-Red-Devils
  repo_version: v01
  data_variant: origin   # origin | augmented
  push_to_hub: true
  hf_private: false

eval:
  eval_gen_batch_size: 2
  eval_fol_max_samples: null
  experiment_inference_sample_n: 3
  # Sau FT: trung bình thời gian greedy 1 prompt/mẫu trên N index ngẫu nhiên (0 = tắt). Env: FOL_INFER_BENCH_*
  inference_latency_benchmark_n: 30
  inference_latency_warmup: 2
  inference_latency_benchmark_split: test
