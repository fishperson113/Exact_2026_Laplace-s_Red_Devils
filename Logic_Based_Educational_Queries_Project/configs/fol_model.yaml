# Tham khảo + mặc định khi gọi `FolSFTConfig.from_env()`: đọc file này trước (cùng repo Git).
# Bí mật không đặt trong YAML: chỉ `HF_TOKEN` / `GIT_TOKEN` trong `.env` (xem `.env.example`).
# Tùy chọn ghi đè khi chạy CI hoặc notebook: biến `FOL_*` / `LOGIC_SFT_PROCESSED_DIR` trên shell.

model:
  name: Qwen/Qwen2.5-3B-Instruct
  trust_remote_code: true
  max_seq_length: 2048
  gen_max_new_tokens: 512

lora:
  r: 8
  alpha: 16
  dropout: 0.1

training:
  num_train_epochs: 10
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  warmup_ratio: 0.05
  weight_decay: 0.01
  logging_steps: 10
  bf16: true
  gradient_checkpointing: true
  train_seed: 3407
  gpu_profile: auto
  # true hoặc FOL_LOAD_IN_8BIT=1 / FOL_GPU_PROFILE=8bit — INT8 bitsandbytes (chính xác hơn NF4; FOL_LOAD_IN_4BIT=1 vẫn bật INT8)
  load_in_8bit: true
  # T4 / OOM: Unsloth + loss chỉ assistant + adamw_8bit (cần pip install unsloth); notebook: FolSFTConfig.from_env(use_unsloth=True)
  use_unsloth: true
  unsloth_train_on_responses_only: true
  use_adamw_8bit: true
  # Early stop theo metric trên dev (mỗi epoch eval); 0 = tắt. Env: FOL_EARLY_STOPPING_PATIENCE
  early_stopping_patience: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false

paths:
  # FOL_SFT_PROCESSED_DIR hoặc mặc định data/processed (chung với logic SFT)
  processed_subdir: data/processed

hub:
  org: Laplaces-Red-Devils
  repo_version: v01
  data_variant: origin   # origin | augmented
  push_to_hub: true
  hf_private: false

eval:
  eval_gen_batch_size: 10
  eval_fol_max_samples: 20
  experiment_inference_sample_n: 8
  # Sau push Hub: tải merged từ Hub, **chỉ** greedy trên N mẫu test ngẫu nhiên + exact-match trên đúng N mẫu (fol_hub_reload_eval.json; README Hub ~2 mẫu).
  hub_reload_after_push: true
  hub_reload_random_test_n: 20
  hub_reload_random_seed: 42
  # Sau FT: benchmark latency greedy (trung bình N mẫu; 0 = tắt) — chỉnh tại đây hoặc `FOL_INFER_BENCH_*` trên shell.
  inference_latency_benchmark_n: 30
  inference_latency_warmup: 2
  inference_latency_benchmark_split: test

  
