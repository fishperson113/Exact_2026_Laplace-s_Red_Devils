# ============================================================
# Stage 1: Pretrain FOL model tren MALLS (28K samples)
# ============================================================
# Muc dich: model hoc co ban cach dich NL → FOL tu MALLS dataset
# Sau do chuyen sang Stage 2 (fol_model.yaml) de fine-tune tren target
#
# Cach chay:
#   python -m models.fol_model.pretrain
#   hoac trong notebook: from models.fol_model.pretrain import run_pretrain

model:
  name: Qwen/Qwen2.5-3B-Instruct
  trust_remote_code: true
  max_seq_length: 2048
  gen_max_new_tokens: 512

lora:
  r: 8
  alpha: 16
  dropout: 0.05

training:
  # Stage 1: 3 epochs co dinh, khong early stopping, khong eval metric
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  warmup_ratio: 0.05
  weight_decay: 0.01
  logging_steps: 50
  bf16: true
  gradient_checkpointing: true
  train_seed: 3407
  load_in_8bit: true
  use_unsloth: true
  unsloth_train_on_responses_only: true
  use_adamw_8bit: true
  # Khong early stopping cho pretrain
  early_stopping_patience: 0
  load_best_model_at_end: false
  save_total_limit: 1

data:
  # Duong dan tuong doi tu project root
  malls_json: data/processed/malls_v01_normalized.json
  val_ratio: 0.02    # 2% MALLS lam dev (~565 mau)

paths:
  output_dir: notebooks/output/pipeline_fol_pretrain
  checkpoint_dir: notebooks/output/pipeline_fol_pretrain/pretrain_lora

hub:
  # Sau pretrain: merge LoRA + push len Hub de Stage 2 load lam base model
  push_to_hub: true
  repo_id: Laplaces-Red-Devils/fol-pretrain-malls-qwen2.5-3
  private: false
