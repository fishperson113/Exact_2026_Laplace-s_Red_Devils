# ──────────────────────────────────────────────────────────────
# v05 Formula Knowledge Base
# Each domain: unit_conversions, formulas
# Physical constants are read from scipy.constants at runtime.
# Formulas are written as Python-executable expressions.
# ──────────────────────────────────────────────────────────────

LD:
  unit_conversions:
    - "uC = 1e-6 C (microcoulomb)"
    - "nC = 1e-9 C (nanocoulomb)"
    - "pC = 1e-12 C (picocoulomb)"
    - "cm = 0.01 m"
    - "mm = 0.001 m"
    - "kV/m = 1e3 V/m"
  formulas:
    - name: "Coulomb's Law"
      formula: "F = k * abs(q1) * abs(q2) / r**2"
      result_unit: "N"
      notes: "Force magnitude between two point charges"
    - name: "Electric field of point charge"
      formula: "E = k * abs(q) / r**2"
      result_unit: "V/m"
      notes: "Field magnitude at distance r from charge q"
    - name: "Superposition of forces (collinear)"
      formula: "F_net = F1 + F2  # same direction; F_net = abs(F1 - F2) opposite"
      result_unit: "N"
      notes: "Add magnitudes if same direction, subtract if opposite"
    - name: "Superposition of forces (2D)"
      formula: "F_net = math.sqrt(F1**2 + F2**2 + 2*F1*F2*math.cos(theta))"
      result_unit: "N"
      notes: "General vector addition; theta is angle between F1 and F2"
    - name: "Equilibrium position on a line"
      formula: "x = d / (1 + math.sqrt(abs(q2/q1)))"
      result_unit: "m"
      notes: "Position of equilibrium charge between q1 (at 0) and q2 (at d), same-sign charges"
    - name: "Electric force on charge in field"
      formula: "F = abs(q) * E"
      result_unit: "N"
      notes: "Force on charge q in uniform field E"
    - name: "Work done by electric force"
      formula: "A = q * E * d"
      result_unit: "J"
      notes: "Work done moving charge q through distance d along field E"

CH:
  unit_conversions:
    - "mH = 1e-3 H (millihenry)"
    - "uF = 1e-6 F (microfarad)"
    - "nF = 1e-9 F (nanofarad)"
    - "pF = 1e-12 F (picofarad)"
    - "kOhm = 1e3 Ohm"
    - "MHz = 1e6 Hz"
    - "kHz = 1e3 Hz"
    - "mA = 1e-3 A"
  formulas:
    - name: "Ohm's Law"
      formula: "V = I * R"
      result_unit: "V"
      notes: "Also I = V/R, R = V/I"
    - name: "Power"
      formula: "P = I**2 * R  # or P = V**2 / R  # or P = V * I * cos_phi"
      result_unit: "W"
      notes: "cos_phi = R/Z for AC circuits"
    - name: "Inductive reactance"
      formula: "ZL = omega * L  # omega = 2 * math.pi * f"
      result_unit: "Ohm"
      notes: "omega is angular frequency"
    - name: "Capacitive reactance"
      formula: "ZC = 1 / (omega * C)"
      result_unit: "Ohm"
      notes: "omega is angular frequency"
    - name: "RLC series impedance"
      formula: "Z = math.sqrt(R**2 + (ZL - ZC)**2)"
      result_unit: "Ohm"
      notes: "ZL = omega*L, ZC = 1/(omega*C)"
    - name: "Resonance angular frequency"
      formula: "omega_0 = 1 / math.sqrt(L * C)"
      result_unit: "rad/s"
      notes: "At resonance: ZL = ZC, Z = R, I = max"
    - name: "Resonance frequency"
      formula: "f_0 = 1 / (2 * math.pi * math.sqrt(L * C))"
      result_unit: "Hz"
      notes: "Frequency form of resonance condition"
    - name: "Phase angle"
      formula: "tan_phi = (ZL - ZC) / R"
      result_unit: "rad"
      notes: "phi > 0: inductive (V leads I); phi < 0: capacitive"
    - name: "Power factor"
      formula: "cos_phi = R / Z"
      result_unit: "-"
      notes: "cos_phi = 1 at resonance"
    - name: "Voltage across component"
      formula: "U_R = I * R; U_L = I * ZL; U_C = I * ZC"
      result_unit: "V"
      notes: "RMS voltages in AC circuit"

NL:
  unit_conversions:
    - "uF = 1e-6 F (microfarad)"
    - "nF = 1e-9 F (nanofarad)"
    - "mH = 1e-3 H (millihenry)"
    - "uH = 1e-6 H (microhenry)"
    - "uC = 1e-6 C (microcoulomb)"
    - "nC = 1e-9 C (nanocoulomb)"
    - "mJ = 1e-3 J (millijoule)"
    - "uJ = 1e-6 J (microjoule)"
    - "mA = 1e-3 A"
  formulas:
    - name: "Capacitor energy"
      formula: "W = q**2 / (2 * C)  # or W = C * U**2 / 2  # or W = q * U / 2"
      result_unit: "J"
      notes: "Energy stored in capacitor"
    - name: "Inductor energy"
      formula: "W = L * I**2 / 2"
      result_unit: "J"
      notes: "Energy stored in inductor"
    - name: "LC oscillation charge"
      formula: "q = Q0 * math.cos(omega * t + phi)"
      result_unit: "C"
      notes: "Q0 is max charge, omega = 1/sqrt(LC)"
    - name: "LC oscillation current"
      formula: "i = -Q0 * omega * math.sin(omega * t + phi)"
      result_unit: "A"
      notes: "I0 = Q0 * omega"
    - name: "LC angular frequency"
      formula: "omega = 1 / math.sqrt(L * C)"
      result_unit: "rad/s"
      notes: "Natural frequency of LC circuit"
    - name: "LC period"
      formula: "T = 2 * math.pi * math.sqrt(L * C)"
      result_unit: "s"
      notes: "Period of LC oscillation"
    - name: "Energy conservation in LC"
      formula: "Q0**2 / (2 * C) == L * I0**2 / 2"
      result_unit: "J"
      notes: "Total energy constant; I0 = Q0 * omega"
    - name: "Max current from max charge"
      formula: "I0 = Q0 * omega  # omega = 1/math.sqrt(L*C)"
      result_unit: "A"
      notes: "Relationship between amplitude of charge and current"
    - name: "Instantaneous energy split"
      formula: "W_C = q**2 / (2*C); W_L = L*i**2 / 2; W_total = W_C + W_L"
      result_unit: "J"
      notes: "At any instant, total energy = capacitor + inductor energy"

TD:
  unit_conversions:
    - "uF = 1e-6 F (microfarad)"
    - "nF = 1e-9 F (nanofarad)"
    - "pF = 1e-12 F (picofarad)"
    - "uC = 1e-6 C (microcoulomb)"
    - "nC = 1e-9 C (nanocoulomb)"
    - "cm = 0.01 m"
    - "mm = 0.001 m"
    - "cm^2 = 1e-4 m^2"
    - "mm^2 = 1e-6 m^2"
    - "nJ = 1e-9 J"
    - "uJ = 1e-6 J"
    - "mJ = 1e-3 J"
  formulas:
    - name: "Parallel plate capacitance"
      formula: "C = epsilon_0 * epsilon_r * S / d"
      result_unit: "F"
      notes: "epsilon_r is relative permittivity (1 for vacuum/air)"
    - name: "Charge on capacitor"
      formula: "Q = C * U"
      result_unit: "C"
      notes: "Q is charge, U is voltage across plates"
    - name: "Capacitor energy"
      formula: "W = C * U**2 / 2  # or W = Q**2 / (2*C)  # or W = Q*U/2"
      result_unit: "J"
      notes: "Energy stored in capacitor"
    - name: "Series capacitors"
      formula: "1/C_eq = 1/C1 + 1/C2  # for two: C_eq = C1*C2/(C1+C2)"
      result_unit: "F"
      notes: "Equivalent capacitance decreases in series"
    - name: "Parallel capacitors"
      formula: "C_eq = C1 + C2 + C3"
      result_unit: "F"
      notes: "Equivalent capacitance increases in parallel"
    - name: "Electric field between plates"
      formula: "E = U / d"
      result_unit: "V/m"
      notes: "Uniform field between parallel plates separated by d"
    - name: "Capacitance with dielectric"
      formula: "C_new = epsilon_r * C_vacuum"
      result_unit: "F"
      notes: "Inserting dielectric multiplies capacitance by epsilon_r"
    - name: "Charge conservation (disconnected)"
      formula: "Q_total = Q1 + Q2  # constant after disconnecting from source"
      result_unit: "C"
      notes: "If capacitor is disconnected, total charge is conserved"

DDT:
  unit_conversions:
    - "mH = 1e-3 H (millihenry)"
    - "uH = 1e-6 H (microhenry)"
    - "cm = 0.01 m"
    - "mm = 0.001 m"
    - "cm^2 = 1e-4 m^2"
    - "mT = 1e-3 T (millitesla)"
    - "uT = 1e-6 T (microtesla)"
    - "mWb = 1e-3 Wb (milliweber)"
    - "mV = 1e-3 V"
    - "rpm = rev/min -> omega = rpm * 2*pi/60 rad/s"
  formulas:
    - name: "Magnetic flux"
      formula: "Phi = B * S * math.cos(alpha)"
      result_unit: "Wb"
      notes: "alpha is angle between B and normal to surface S"
    - name: "Faraday's law (EMF)"
      formula: "EMF = -N * dPhi / dt"
      result_unit: "V"
      notes: "N is number of turns; magnitude: EMF = N * |dPhi/dt|"
    - name: "Solenoid magnetic field"
      formula: "B = mu_0 * n * I  # n = N/l (turns per meter)"
      result_unit: "T"
      notes: "n is turns per unit length, I is current"
    - name: "Self-inductance of solenoid"
      formula: "L = mu_0 * n**2 * V  # V = S*l (volume), n = N/l"
      result_unit: "H"
      notes: "Also L = mu_0 * N**2 * S / l"
    - name: "Self-induced EMF"
      formula: "e_self = -L * dI / dt"
      result_unit: "V"
      notes: "Magnitude: |e| = L * |dI/dt|"
    - name: "EMF of rotating coil"
      formula: "EMF = N * B * S * omega * math.sin(omega * t)"
      result_unit: "V"
      notes: "Peak EMF: E0 = N*B*S*omega; omega = 2*pi*f"
    - name: "Mutual inductance flux"
      formula: "Phi_mutual = M * I"
      result_unit: "Wb"
      notes: "M is mutual inductance between two coils"
    - name: "Inductance energy"
      formula: "W = L * I**2 / 2"
      result_unit: "J"
      notes: "Energy stored in inductor/solenoid"

THCB:
  unit_conversions:
    - "kOhm = 1e3 Ohm"
    - "mA = 1e-3 A"
    - "mV = 1e-3 V"
    - "kV = 1e3 V"
    - "mW = 1e-3 W"
    - "kW = 1e3 W"
  formulas:
    - name: "Ohm's Law"
      formula: "V = I * R"
      result_unit: "V"
      notes: "Also I = V/R, R = V/I"
    - name: "Kirchhoff's Voltage Law (KVL)"
      formula: "sum_EMF = sum_IR  # around a closed loop"
      result_unit: "V"
      notes: "Sum of EMFs equals sum of voltage drops around a loop"
    - name: "Kirchhoff's Current Law (KCL)"
      formula: "sum_I_in = sum_I_out  # at a node"
      result_unit: "A"
      notes: "Current entering a node equals current leaving"
    - name: "Terminal voltage"
      formula: "U = EMF - I * r"
      result_unit: "V"
      notes: "r is internal resistance of the source"
    - name: "Series resistors"
      formula: "R_eq = R1 + R2 + R3"
      result_unit: "Ohm"
      notes: "Total resistance increases in series"
    - name: "Parallel resistors"
      formula: "1/R_eq = 1/R1 + 1/R2  # for two: R_eq = R1*R2/(R1+R2)"
      result_unit: "Ohm"
      notes: "Total resistance decreases in parallel"
    - name: "Power dissipated"
      formula: "P = I**2 * R  # or P = V**2/R  # or P = V*I"
      result_unit: "W"
      notes: "Electrical power dissipated in resistor"
    - name: "Relative error"
      formula: "delta_rel = abs(measured - true_val) / true_val * 100"
      result_unit: "%"
      notes: "Percentage error"
    - name: "Absolute error"
      formula: "delta_abs = abs(measured - true_val)"
      result_unit: "same as measured quantity"
      notes: "Difference between measured and true value"

DT:
  unit_conversions:
    - "uC = 1e-6 C (microcoulomb)"
    - "nC = 1e-9 C (nanocoulomb)"
    - "cm = 0.01 m"
    - "mm = 0.001 m"
    - "kV/m = 1e3 V/m"
    - "MV/m = 1e6 V/m"
    - "eV = 1.6e-19 J (electronvolt)"
  formulas:
    - name: "Electric field of point charge"
      formula: "E = k * abs(q) / r**2"
      result_unit: "V/m"
      notes: "Directed radially outward for positive charge"
    - name: "Electric potential of point charge"
      formula: "V = k * q / r"
      result_unit: "V"
      notes: "Scalar quantity; can be positive or negative"
    - name: "Uniform electric field"
      formula: "E = U / d"
      result_unit: "V/m"
      notes: "Between parallel plates with voltage U and separation d"
    - name: "Potential difference and field"
      formula: "U = E * d  # along field direction"
      result_unit: "V"
      notes: "V_A - V_B = E * d_AB (A is higher potential toward + plate)"
    - name: "Work by electric field"
      formula: "A = q * (V_A - V_B)  # or A = q * E * d"
      result_unit: "J"
      notes: "Work done moving charge q from A to B"
    - name: "Potential energy"
      formula: "W = q * V"
      result_unit: "J"
      notes: "Potential energy of charge q at potential V"
    - name: "Superposition of fields"
      formula: "E_net = math.sqrt(E1**2 + E2**2 + 2*E1*E2*math.cos(theta))"
      result_unit: "V/m"
      notes: "Vector sum of fields; theta is angle between E1 and E2"
    - name: "Superposition of potentials"
      formula: "V_net = V1 + V2 + V3"
      result_unit: "V"
      notes: "Scalar sum; no vector addition needed"

CHLT:
  unit_conversions:
    - "uF = 1e-6 F (microfarad)"
    - "mH = 1e-3 H (millihenry)"
    - "kHz = 1e3 Hz"
  formulas:
    - name: "Resonance condition"
      formula: "omega_0 = 1 / math.sqrt(L * C)  # ZL == ZC"
      result_unit: "rad/s"
      notes: "At resonance: Z = R (minimum impedance)"
    - name: "Current at resonance"
      formula: "I_max = U / R"
      result_unit: "A"
      notes: "Maximum current occurs at resonance"
    - name: "Power factor at resonance"
      formula: "cos_phi = 1"
      result_unit: "-"
      notes: "cos(phi) = R/Z = R/R = 1 at resonance"
    - name: "Voltage across L or C at resonance"
      formula: "U_L = U_C = I * ZL  # can exceed source voltage U"
      result_unit: "V"
      notes: "Voltage magnification at resonance"
    - name: "Condition for max U_L"
      formula: "omega_L = omega_0 / math.sqrt(1 - R**2*C/(2*L))"
      result_unit: "rad/s"
      notes: "Frequency for maximum voltage across inductor"
    - name: "Condition for max U_C"
      formula: "omega_C = omega_0 * math.sqrt(1 - R**2*C/(2*L))"
      result_unit: "rad/s"
      notes: "Frequency for maximum voltage across capacitor"
